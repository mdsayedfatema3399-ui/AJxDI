<!DOCTYPE html>
<html>
<head>
    <title>Sayed | Social Links</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            text-align: center;
        }

        /* Animated gradient background */
        body::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                #ff00cc,
                #3333ff,
                #00ffcc,
                #ff6600
            );
            animation: animateBG 10s linear infinite;
            z-index: -1;
        }

        @keyframes animateBG {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            background: rgba(0, 0, 0, 0.6);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        button {
            display: block;
            width: 200px;
            margin: 15px auto;
            padding: 12px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        .youtube {
            background: #ff0000;
            color: white;
        }

        .instagram {
            background: #e1306c;
            color: white;
        }

        button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px white;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Follow Me 😎</h1>

        <button class="youtube" onclick="goYoutube()">
            YouTube Channel
        </button>

        <button class="instagram" onclick="goInstagram()">
            Instagram Profile
        </button>
    </div>

    <script>
        function goYoutube() {
    window.open("https://youtube.com/@ajxdi?si=Y7RMn-HmwSAnKTzc", "_blank");
}

function goInstagram() {
    window.open("https://www.instagram.com/ajxdi2.0?igsh=MWt1bXQ5ejg3MDZvZw==", "_blank");
}
    </script>

</body>
</html>
